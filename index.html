<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProCoderX</title>

    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/apple-touch-icon.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-title" content="YourSiteName" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- font preload -->
    <link rel="preload" href="/fonts/Nunito-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Nunito-Regular.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Baaki ke tags... -->

    <!-- RESPONSIVE PRELOAD: Jiski screen, sirf wahi download hogi! -->
    <!-- Mobile ke liye (Screen width 639px tak) -->
    <link
      rel="preload"
      href="/procoderx-logo-74.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(max-width: 639px)"
    />

    <!-- Tablet ke liye (Screen width 640px se 1023px tak) -->
    <link
      rel="preload"
      href="/procoderx-logo-68.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 640px) and (max-width: 1023px)"
    />

    <!-- Laptop/Badi screen ke liye (Screen width 1024px ya usse badi) -->
    <link
      rel="preload"
      href="/procoderx-logo-96.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
      media="(min-width: 1024px)"
    />
  </head>
  <body>
    <div id="root" class="font-sans"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
